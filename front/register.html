<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="container">
        <div class="register-card">
            <h1 class="title">РЕГИСТРАЦИЯ</h1>
            
            <div class="form-group">
                <label class="label">Имя пользователя</label>
                <input type="text" class="input" placeholder="Введите имя">
            </div>

            <div class="form-group">
                <label class="label">Почта</label>
                <input type="email" class="input" placeholder="Введите Вашу почту">
            </div>

            <div class="form-group">
                <label class="label">Пароль</label>
                <input type="password" class="input" placeholder="Введите пароль">
            </div>

            <div class="form-group">
                <label class="label">Подтверждение пароля</label>
                <input type="password" class="input" placeholder="Повторите пароль">
            </div>

            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" class="checkbox">
                    <span>Я принимаю условия использования</span>
                </label>
            </div>

            <button class="register-btn">Зарегистрироваться</button>

            <div class="login-link">
                Уже есть аккаунт? <a href="index.html">Войти</a>
            </div>
        </div>
    </div>
</body>
</html>
