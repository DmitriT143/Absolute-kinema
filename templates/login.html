<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вход — КиноПортал</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3a;
      --accent: #e8b84b;
      --accent2: #c8943a;
      --text: #f0ece4;
      --muted: #7a7a9a;
      --error: #e05a5a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed; border-radius: 50%;
      filter: blur(120px); pointer-events: none; z-index: 0;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(232,184,75,0.07) 0%, transparent 70%);
      top: -100px; left: -100px;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(90,80,160,0.1) 0%, transparent 70%);
      bottom: -100px; right: -100px;
    }

    .film-strip {
      position: fixed; right: 0; top: 0;
      width: 36px; height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      padding: 16px 0; z-index: 1;
    }
    .film-hole {
      width: 16px; height: 12px;
      border-radius: 3px;
      background: var(--bg);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .page-wrapper {
      position: relative; z-index: 2;
      width: 100%; max-width: 460px;
      padding: 40px 24px;
      margin-right: 36px;
    }

    .logo {
      text-align: center; margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }
    .logo-icon { font-size: 28px; margin-bottom: 6px; }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 26px; color: var(--accent); letter-spacing: 1px;
    }
    .logo-sub {
      font-size: 12px; color: var(--muted);
      letter-spacing: 3px; text-transform: uppercase; margin-top: 2px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      animation: fadeUp 0.7s ease both;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; margin-bottom: 4px;
    }
    .card-subtitle {
      font-size: 13px; color: var(--muted); margin-bottom: 28px;
    }

    .section-label {
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px;
    }

    .oauth-buttons {
      display: flex; gap: 10px; margin-bottom: 4px;
    }
    .oauth-btn {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      gap: 8px; padding: 10px;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      cursor: not-allowed; opacity: 0.5;
      position: relative;
    }
    .oauth-btn .soon {
      position: absolute; top: -8px; right: -4px;
      background: var(--accent); color: #000;
      font-size: 9px; font-weight: 700;
      padding: 1px 5px; border-radius: 4px; letter-spacing: 0.5px;
    }

    .divider {
      display: flex; align-items: center;
      gap: 12px; margin: 20px 0;
      color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .field {
      display: flex; flex-direction: column;
      gap: 6px; margin-bottom: 14px;
    }
    .field label {
      font-size: 12px; color: var(--muted);
      font-weight: 500; letter-spacing: 0.5px;
    }
    .field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .field input::placeholder { color: var(--muted); opacity: 0.6; }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,184,75,0.1);
    }
    .field input.error { border-color: var(--error); }
    .field-hint {
      font-size: 11px; color: var(--error); display: none;
    }
    .field.has-error .field-hint { display: block; }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap input { padding-right: 42px !important; }
    .toggle-pass {
      position: absolute; right: 12px;
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      font-size: 16px; padding: 4px; line-height: 1;
      transition: color 0.2s; user-select: none;
    }
    .toggle-pass:hover { color: var(--accent); }

    .forgot-link {
      text-align: right; margin-top: -6px; margin-bottom: 6px;
    }
    .forgot-link a {
      font-size: 12px; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .forgot-link a:hover { color: var(--accent); }

    .btn-primary {
      width: 100%; padding: 13px; border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 20px;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-skip {
      width: 100%; padding: 11px; border-radius: 12px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; cursor: pointer;
      margin-top: 10px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-skip:hover { border-color: var(--muted); color: var(--text); }

    .register-link {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--muted);
    }
    .register-link a {
      color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .register-link a:hover { text-decoration: underline; }

    /* Сообщение об ошибке входа */
    .alert-error {
      background: rgba(224,90,90,0.1);
      border: 1px solid rgba(224,90,90,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 16px;
      display: none;
    }
    .alert-error.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      .film-strip { display: none; }
      .page-wrapper { margin-right: 0; padding: 24px 16px; }
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="film-strip" id="filmStrip"></div>

  <div class="page-wrapper">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <div class="logo-text">КиноПортал</div>
      <div class="logo-sub">Онлайн-кинотеатр</div>
    </div>

    <div class="card">
      <div class="card-title">Добро пожаловать</div>
      <div class="card-subtitle">Войдите в свой аккаунт</div>

      <div class="alert-error" id="loginError">
        Неверный email или пароль
      </div>

      <div class="section-label">Войти через</div>
      <div class="oauth-buttons">
        <button class="oauth-btn" disabled>
          <span>🟡</span> Яндекс ID
          <span class="soon">СКОРО</span>
        </button>
        <button class="oauth-btn" disabled>
          <span>🔵</span> VK ID
          <span class="soon">СКОРО</span>
        </button>
      </div>

      <div class="divider">или по почте</div>

      <div class="field" id="f-email">
        <label>Электронная почта</label>
        <input type="email" id="email" placeholder="example@mail.ru" autocomplete="email"/>
        <span class="field-hint">Введите корректный email</span>
      </div>

      <div class="field" id="f-pass">
        <label>Пароль</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Ваш пароль" autocomplete="current-password"/>
          <button type="button" class="toggle-pass" onclick="togglePass('password', this)" title="Показать пароль">👁</button>
        </div>
        <span class="field-hint">Введите пароль</span>
      </div>

      <div class="forgot-link">
        <a href="#">Забыли пароль?</a>
      </div>

      <button class="btn-primary" onclick="doLogin()">Войти →</button>
      <button class="btn-skip" onclick="skipLogin()">Продолжить без аккаунта</button>

      <div class="register-link">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
      </div>
    </div>
  </div>

  <script>
    // Киноплёнка справа
    const strip = document.getElementById('filmStrip');
    for (let i = 0; i < 60; i++) {
      const hole = document.createElement('div');
      hole.className = 'film-hole';
      strip.appendChild(hole);
    }

    function togglePass(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '👁';
        btn.title = 'Скрыть пароль';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
        btn.title = 'Показать пароль';
      }
    }

    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      let ok = true;

      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      setError('f-email', !emailOk);
      if (!emailOk) ok = false;

      const passOk = pass.length >= 1;
      setError('f-pass', !passOk);
      if (!passOk) ok = false;

      if (ok) {
        // Здесь будет fetch POST /login на Flask
        document.getElementById('loginError').classList.add('show');
        // При успехе — убрать ошибку и редирект на главную
      }
    }

    function setError(fieldId, hasError) {
      const field = document.getElementById(fieldId);
      if (!field) return;
      if (hasError) field.classList.add('has-error');
      else field.classList.remove('has-error');
      const inputs = field.querySelectorAll('input');
      inputs.forEach(i => {
        if (hasError) i.classList.add('error');
        else i.classList.remove('error');
      });
    }

    function skipLogin() {
      alert('Продолжение без аккаунта (редирект на главную)');
    }
  </script>
</body>
</html>
